# Codecov configuration for Mokksy and AI-Mocks
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:

    - component_id: kotlin-sdk-core
      name: SDK Core
      paths:
        - kotlin-sdk-core/**

    - component_id: kotlin-sdk-client
      name: SDK Client
      paths:
        - kotlin-sdk-client/**

    - component_id: kotlin-sdk-server
      name: SDK Server
      paths:
        - kotlin-sdk-server/**

    - component_id: kotlin-sdk-testing
      name: SDK Testing
      paths:
        - kotlin-sdk-testing/**

