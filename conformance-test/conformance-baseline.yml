# Expected failures for MCP conformance tests.
# These are known failures due to SDK limitations or unimplemented features.

server:
  - completion-complete           # SDK does not implement completion/complete handler
  - tools-call-with-logging       # SDK StreamableHttp transport does not route notifications to request SSE stream
  - tools-call-with-progress      # SDK StreamableHttp transport does not route notifications to request SSE stream
  - tools-call-sampling           # Conformance runner does not implement sampling handler
  - tools-call-elicitation        # Conformance runner does not implement elicitation handler
  - elicitation-sep1034-defaults  # Conformance runner does not implement elicitation handler
  - elicitation-sep1330-enums     # Conformance runner does not implement elicitation handler
  - resources-templates-read      # SDK does not support addResourceTemplate()
  - dns-rebinding-protection      # DNS rebinding protection not enabled in test server
